<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse Terminal v1.7.1</title>
    <style>
        * { box-sizing: border-box !important; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        body, html { background-color: #0a0a0a; color: #ffffff; width: 100%; max-width: 100vw; overflow-x: hidden; }
        .header { padding: 20px; font-size: 14px; font-weight: bold; border-bottom: 2px solid #f1c40f; margin: 0 15px; color: #fff; text-align: center; }
        
        /* Блок поиска (закреплен сверху) */
        .search-container { position: sticky; top: 0; background-color: #0a0a0a; padding: 15px; z-index: 100; border-bottom: 1px solid #333; }
        
        /* Стилизация type="search" для появления крестика очистки */
        .search-input { width: 100%; background-color: #141414; color: #fff; border: 1px solid #f1c40f; border-radius: 8px; padding: 15px; font-size: 18px; outline: none; }
        .search-input::placeholder { color: #666; }
        .search-input::-webkit-search-cancel-button { -webkit-appearance: searchfield-cancel-button; cursor: pointer; filter: invert(1); }

        .items-container { display: flex; flex-direction: column; gap: 15px; padding: 15px 15px 50px 15px; width: 100%; }
        .item-card { background-color: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; position: relative; transition: background-color 0.3s; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
        .item-name { font-size: 22px; font-weight: bold; line-height: 1; color: #fff; }
        .stock-value { font-size: 26px; font-weight: bold; color: #fff; line-height: 0.8; }
        .stock-label { font-size: 9px; color: #666; text-transform: uppercase; margin-top: 4px; }
        .action-row { display: flex !important; width: 100% !important; gap: 10px !important; align-items: center; }
        
        select { flex: 1 1 auto !important; min-width: 0; background-color: #000; color: #d1d1d1; border: 1px solid #f1c40f; border-radius: 4px; padding: 12px 8px; height: 50px; outline: none; font-size: 14px; }
        input[type="number"] { width: 75px !important; flex: 0 0 75px !important; background-color: #000; color: #fff; border: 1px solid #333; border-radius: 4px; text-align: center; height: 50px; font-size: 20px; outline: none; }
        
        button { flex: 0 0 auto; background-color: #f1c40f; color: #000; font-weight: bold; border: none; border-radius: 4px; padding: 0 15px; height: 50px; cursor: pointer; transition: background-color 0.3s, color 0.3s; }
        button.success { background-color: #2ecc71 !important; color: #fff !important; }
        
        .loading { text-align: center; padding: 40px; color: #f1c40f; font-weight: bold; }
        .syncing { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">TERMINAL_ID: WH_MAIN (v1.7.1)</div>
    
    <div class="search-container">
        <input type="search" id="search-box" class="search-input" placeholder="🔍 Поиск товара..." onkeyup="filterItems()">
    </div>

    <div id="loading-status" class="loading">СИНХРОНИЗАЦИЯ...</div>
    <div class="items-container" id="terminal-list"></div>

    <script>
        // === МАСКИРОВКА ССЫЛОК ===
        // ВСТАВЬТЕ СВОЙ ENCODED ТЕКСТ НИЖЕ:
        const _0x1a8f = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J4S3FvQ29DZ0VZSldwdnpNMENXSGZLdTdlblNrR3llVTVWLWRBd3lsQW1CZEVFaTVYaWZDaDVyQ1JjOGlUczZvcTEvZXhlYw=="; 
        const _0x5bc2 = "aHR0cHM6Ly9ob29rLmV1MS5tYWtlLmNvbS85dWQyeWV0dHIzbDZrdG81bmx0cXR0am9jZmI2cDZvZw==";

        const APPS_SCRIPT_URL = window.atob(_0x1a8f);
        const MAKE_WEBHOOK_URL = window.atob(_0x5bc2);

        let itemsDb = [];

        async function loadItems(isSilent = false) {
            if (!isSilent) document.getElementById('loading-status').style.display = 'block';
            try {
                const response = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
                itemsDb = await response.json();
                document.getElementById('loading-status').style.display = 'none';
                render();
                filterItems(); // Применяем фильтр после обновления данных
            } catch (e) { document.getElementById('loading-status').innerText = "ОШИБКА СВЯЗИ"; }
        }

        function render() {
            const list = document.getElementById('terminal-list');
            list.innerHTML = itemsDb.map(item => `
                <div class="item-card" id="card-${item.id}" data-name="${item.name.toLowerCase()}">
                    <div class="card-top">
                        <div class="item-name">${item.name}</div>
                        <div style="text-align:right">
                            <div class="stock-value">${item.stock}</div>
                            <div class="stock-label">ОСТАТОК</div>
                        </div>
                    </div>
                    <div class="action-row">
                        <select id="type-${item.id}">
                            <option value="sale">Расход (Sale)</option>
                            <option value="restock">Приход (Restock)</option>
                            <option value="return">Возврат (Return)</option>
                            <option value="writeoff">Списание (Writeoff)</option>
                        </select>
                        <input type="number" id="qty-${item.id}" value="0" 
                               onfocus="if(this.value==='0')this.value=''" 
                               onblur="if(this.value==='')this.value='0'">
                        <button id="btn-${item.id}" onclick="sendData('${item.id}', this)">ВВОД</button>
                    </div>
                </div>
            `).join('');
        }

        function filterItems() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const cards = document.querySelectorAll('.item-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        async function sendData(id, btnElement) {
            const type = document.getElementById(`type-${id}`).value;
            const qtyInput = document.getElementById(`qty-${id}`);
            const qty = parseInt(qtyInput.value) || 0;
            const item = itemsDb.find(i => i.id === id);

            if (qty <= 0) return alert("Введите количество");
            
            const card = document.getElementById(`card-${id}`);
            card.classList.add('syncing');
            btnElement.innerText = "...";

            const payload = {
                tx_id: Math.random().toString(36).substring(2, 8).toUpperCase(),
                item_id: id,
                item_name: item.name,
                qty: qty,
                price: type === 'sale' ? (item.price || 0) : 0,
                cost_price: item.cost || 0,
                tx_type: type,
                source: "terminal_v1.7.1"
            };

            try {
                const res = await fetch(MAKE_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    btnElement.classList.add('success');
                    btnElement.innerText = "✓ УСПЕШНО";
                    
                    setTimeout(() => {
                        qtyInput.value = "0"; 
                        btnElement.classList.remove('success');
                        btnElement.innerText = "ВВОД";
                        
                        // АВТО-ОЧИСТКА ПОИСКА
                        const searchBox = document.getElementById('search-box');
                        if (searchBox.value !== '') {
                            searchBox.value = '';
                            filterItems(); // Сбрасываем фильтр, чтобы показать все товары
                        }
                        
                        loadItems(true); 
                    }, 2000); 
                }
            } catch (e) { alert("ОШИБКА"); }
            finally {
                card.classList.remove('syncing');
            }
        }
        
        loadItems();
    </script>
</body>
</html>
