<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Noir V2.9</title>
    <style>
        * { box-sizing: border-box !important; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        body, html { background-color: #0a0a0a; color: #ffffff; width: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header { flex-shrink: 0; padding: 10px; font-size: 10px; border-bottom: 1px solid #333; text-align: center; color: #444; }
        .mode-selector { display: flex; padding: 10px 15px; gap: 10px; border-bottom: 1px solid #333; }
        .mode-btn { flex: 1; padding: 20px; border: 1px solid #333; background: #111; color: #555; font-size: 16px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .mode-btn.active-sale { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .mode-btn.active-return { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }
        .search-section { padding: 10px 15px; border-bottom: 1px solid #333; }
        .search-input { width: 100%; background: #141414; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 16px; font-size: 18px; outline: none; }
        .catalog-container { flex-grow: 1; overflow-y: auto; padding: 10px 15px; }
        .catalog-item { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .item-meta { font-size: 14px; color: #f1c40f; display: flex; gap: 15px; }
        .item-stock { color: #555; font-weight: normal; }
        .cart-section { background: #111; border-top: 3px solid #2ecc71; padding: 15px; transition: 0.3s; }
        .cart-section.return-theme { border-top-color: #e74c3c; background: #1a0a0a; }
        .cart-items { max-height: 250px; overflow-y: auto; margin-bottom: 10px; padding-bottom: 100px; }
        .cart-row { display: flex; flex-direction: column; margin-bottom: 12px; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .cart-row-name { font-weight: bold; font-size: 16px; margin-bottom: 12px; color: #eee; }
        .cart-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .qty-controls { display: flex; align-items: center; background: #000; border-radius: 6px; border: 1px solid #444; }
        .qty-btn { background: #222; color: #f1c40f; font-size: 28px; width: 50px; height: 50px; border: none; }
        .qty-val { width: 40px; text-align: center; font-weight: bold; font-size: 20px; }
        .price-edit { width: 110px; background: #000; color: #f1c40f; border: 1px solid #444; text-align: right; padding: 12px; border-radius: 6px; font-size: 20px; font-weight: 900; outline: none; }
        .total-row { display: flex; justify-content: space-between; font-size: 24px; font-weight: 900; margin: 10px 0; border-top: 1px solid #333; padding-top: 15px; }
        .pay-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-pay { height: 60px; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; text-transform: uppercase; color: #fff; }
        .btn-cash { background: #27ae60; }
        .btn-qr { background: #c0392b; }
        .btn-card { background: #2980b9; }
        .btn-transfer { background: #f39c12; color: #000; }
        .syncing { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">SYS_TERMINAL_V2.9_NOIR_FIXED</div>

    <div class="mode-selector">
        <button id="btn-mode-sale" class="mode-btn active-sale" onclick="setMode('sale')">ПРОДАЖА</button>
        <button id="btn-mode-return" class="mode-btn" onclick="setMode('return')">ВОЗВРАТ</button>
    </div>

    <div class="search-section">
        <input type="text" id="search-box" class="search-input" placeholder="ПОИСК ТОВАРА..." onkeyup="filterItems()">
    </div>

    <div id="catalog" class="catalog-container"></div>

    <div id="cart-section" class="cart-section">
        <div id="cart-list" class="cart-items"></div>
        <div class="total-row">
            <span id="total-label">ИТОГО:</span>
            <span id="total-amount">0</span>
        </div>
        <div class="pay-buttons">
            <button class="btn-pay btn-cash" onclick="processSale('cash')">Наличные</button>
            <button class="btn-pay btn-qr" onclick="processSale('qr_kaspi')">Kaspi QR</button>
            <button class="btn-pay btn-card" onclick="processSale('pos_terminal')">Терминал</button>
            <button class="btn-pay btn-transfer" onclick="processSale('transfer')">Перевод</button>
        </div>
    </div>

    <script src="config.js?v=2.9"></script>

    <script>
        let itemsDb = [], cart = [], currentMode = 'sale';

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-mode-sale').classList.toggle('active-sale', m === 'sale');
            document.getElementById('btn-mode-return').classList.toggle('active-return', m === 'return');
            document.getElementById('cart-section').classList.toggle('return-theme', m === 'return');
            document.getElementById('total-label').innerText = m === 'return' ? 'К ВОЗВРАТУ:' : 'ИТОГО:';
        }

        async function loadCatalog() {
            try {
                const res = await fetch(APPS_SCRIPT_URL + "?action=getItems&t=" + Date.now());
                itemsDb = await res.json();
                renderCatalog();
            } catch (e) { console.error("Load fail"); }
        }

        function renderCatalog() {
            document.getElementById('catalog').innerHTML = itemsDb.map(i => `
                <div class="catalog-item" onclick="addToCart('${i.id}')">
                    <div class="item-info">
                        <div class="item-name">${i.name}</div>
                        <div class="item-meta">
                            <span>${i.price} ₸</span>
                            <span class="item-stock">[OCT: ${i.stock || 0}]</span>
                        </div>
                    </div>
                    <div style="font-size:30px; color:#f1c40f">+</div>
                </div>
            `).join('');
        }

        function filterItems() {
            let q = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('.catalog-item').forEach(el => {
                el.style.display = el.querySelector('.item-name').innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function addToCart(id) {
            const p = itemsDb.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({ id: p.id, name: p.name, qty: 1, price: p.price, cost: p.cost });
            renderCart();
            const list = document.getElementById('cart-list');
            list.scrollTop = list.scrollHeight;
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-row" id="row-${item.id}">
                    <div class="cart-row-name">${item.name}</div>
                    <div class="cart-controls">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${item.id}', -1)">-</button>
                            <div class="qty-val">${item.qty}</div>
                            <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
                        </div>
                        <input type="number" class="price-edit" value="${item.price}" 
                               onfocus="handleFocus(this, 'row-${item.id}')" 
                               oninput="updatePrice('${item.id}', this.value)">
                        <div onclick="remove('${item.id}')" style="color:#e74c3c; padding:12px; font-size:20px;">✕</div>
                    </div>
                </div>
            `).join('');
            updateTotal();
        }

        function handleFocus(elem, rowId) {
            elem.select();
            setTimeout(() => {
                document.getElementById(rowId).scrollIntoView({behavior: "smooth", block: "center"});
            }, 350);
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) remove(id); else renderCart(); }
        }

        function updatePrice(id, val) {
            const i = cart.find(x => x.id === id);
            if(i) i.price = parseFloat(val) || 0;
            updateTotal();
        }

        function remove(id) { cart = cart.filter(x => x.id !== id); renderCart(); }

        function updateTotal() {
            const sum = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('total-amount').innerText = sum.toLocaleString();
        }

        async function processSale(method) {
            if (!cart.length) return;
            const sec = document.getElementById('cart-section');
            sec.classList.add('syncing');

            const tx_id = (currentMode === 'sale' ? "SL-" : "RT-") + Math.random().toString(36).substring(7).toUpperCase();
            
            const payload = {
                tx_id: tx_id,
                tx_type: currentMode === 'sale' ? "sale" : "return",
                payment_method: method,
                source: "pos_v2.9_noir",
                cart: cart.map(c => ({
                    item_id: c.id,
                    item_name: c.name,
                    qty: c.qty,
                    price: c.price,
                    cost_price: c.cost
                }))
            };

            try {
                await Promise.all([
                    fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }),
                    fetch(MAKE_WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
                ]);

                document.getElementById('total-amount').innerText = "DONE";
                setTimeout(() => { cart = []; renderCart(); sec.classList.remove('syncing'); loadCatalog(); }, 1000);
            } catch (e) { alert("FAIL"); sec.classList.remove('syncing'); }
        }

        loadCatalog();
    </script>
</body>
</html>
