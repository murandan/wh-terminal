<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Noir v4.6</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        body { background: #0a0a0a; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header-area { flex-shrink: 0; background: #0a0a0a; border-bottom: 1px solid #222; }
        .modes { display: flex; padding: 4px; gap: 4px; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #333; background: #111; color: #444; font-weight: 900; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .m-btn.active-s { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .m-btn.active-r { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }
        .search-area { padding: 0 4px 4px; }
        .s-input { width: 100%; background: #141414; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 12px; font-size: 16px; outline: none; }
        #catalog { flex-grow: 1; overflow-y: auto; padding: 4px; }
        .c-item { background: #141414; border: 1px solid #222; border-radius: 6px; padding: 12px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .cart-sec { flex-shrink: 0; background: #0a0a0a; border-top: 2px solid #2ecc71; display: flex; flex-direction: column; max-height: 45dvh; }
        #cart-list { overflow-y: auto; padding: 4px; }
        .cart-row { background: #111; padding: 10px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #333; }
        .footer { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; }
        .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .pay { height: 50px; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; color: #fff; text-transform: uppercase; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; padding: 20px; }
        #modal-content { background: #111; border: 1px solid #2ecc71; padding: 15px; border-radius: 8px; flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .m-row { display: flex; justify-content: space-between; font-size: 16px; padding: 10px 0; border-bottom: 1px solid #222; }
        .sync { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="modal">
        <h2 style="margin-bottom:15px; color:#2ecc71; text-align:center;">ПОДТВЕРЖДЕНИЕ</h2>
        <div id="modal-content"></div>
        <div style="display:flex; gap:10px; height:60px;">
            <button onclick="closeModal()" style="flex:1; background:#444; border:none; color:#fff; border-radius:8px;">ОТМЕНА</button>
            <button id="confirm-btn" style="flex:2; background:#27ae60; border:none; color:#fff; font-weight:bold; border-radius:8px; font-size:18px;">ОК</button>
        </div>
    </div>

    <div class="header-area">
        <div class="modes">
            <button id="ms" class="m-btn active-s" onclick="sm('sale')">Продажа</button>
            <button id="mr" class="m-btn" onclick="sm('return')">Возврат</button>
        </div>
        <div class="search-area"><input type="text" id="sb" class="s-input" placeholder="ПОИСК..." onkeyup="filter()"></div>
    </div>

    <div id="catalog"></div>

    <div id="cs" class="cart-sec">
        <div id="cart-list"></div>
        <div class="footer">
            <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:900; margin-bottom:10px;">
                <span>ИТОГО:</span><span id="ta">0 ₸</span>
            </div>
            <div class="btns">
                <button class="pay" style="background:#27ae60" onclick="prePay('cash')">Нал</button>
                <button class="pay" style="background:#c0392b" onclick="prePay('qr_kaspi')">QR</button>
                <button class="pay" style="background:#2980b9" onclick="prePay('pos_terminal')">Карт</button>
                <button class="pay" style="background:#f39c12;color:#000" onclick="prePay('transfer')">Пер</button>
            </div>
        </div>
    </div>

    <script src="config.js?v=4.6"></script>
    <script>
        let db = [], cart = [], mode = 'sale', currentMethod = '';

        function sm(m) {
            mode = m;
            document.getElementById('ms').classList.toggle('active-s', m==='sale');
            document.getElementById('mr').classList.toggle('active-r', m==='return');
        }

        async function load() {
            const res = await fetch(APPS_SCRIPT_URL + "?action=getItems&t=" + Date.now());
            db = await res.json();
            render();
        }

        function render() {
            document.getElementById('catalog').innerHTML = db.map(i => `
                <div class="c-item" onclick="add('${i.id}')">
                    <div style="font-size:15px; font-weight:bold;">${i.name}</div>
                    <div style="font-size:13px; color:#f1c40f;">${i.price} ₸ <span style="color:#888">[${i.stock||0}]</span></div>
                </div>
            `).join('');
        }

        function filter() {
            let q = document.getElementById('sb').value.toLowerCase();
            document.querySelectorAll('.c-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q)?'flex':'none';
            });
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({id:p.id, name:p.name, qty:1, price:p.price, cost:p.cost});
            update();
        }

        function update() {
            document.getElementById('cart-list').innerHTML = cart.map((item, idx) => `
                <div class="cart-row" id="r-${item.id}">
                    <div class="row-top">${item.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; border:1px solid #555; border-radius:4px; height:50px; background:#000;">
                            <button onclick="qty('${item.id}',-1)" style="width:45px; height:100%; background:#222; border:none; color:#f1c40f; font-size:24px;">-</button>
                            <input type="text" inputmode="numeric" style="width:65px; height:100%; text-align:center; font-size:22px; font-weight:bold; background:transparent; border:none; color:#fff; border-left:1px solid #555; border-right:1px solid #555;" value="${item.qty}" 
                                   onfocus="this.select()" oninput="cart[${idx}].qty=parseInt(this.value)||0; total()" onblur="if(cart[${idx}].qty<=0) rm('${item.id}')">
                            <button onclick="qty('${item.id}',1)" style="width:45px; height:100%; background:#222; border:none; color:#f1c40f; font-size:24px;">+</button>
                        </div>
                        <input type="text" inputmode="numeric" style="width:115px; height:50px; background:#000; color:#f1c40f; border:1px solid #555; text-align:right; padding:8px; border-radius:4px; font-size:20px; font-weight:bold;" value="${item.price}" 
                               onfocus="this.select()" oninput="cart[${idx}].price=parseFloat(this.value)||0; total()">
                        <div onclick="rm('${item.id}')" style="color:#e74c3c; font-size:30px; padding:0 10px;">✕</div>
                    </div>
                </div>
            `).join('');
            total();
        }

        function qty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) rm(id); else update(); }
        }
        function rm(id) { cart = cart.filter(x => x.id !== id); update(); }
        function total() {
            const s = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('ta').innerText = s.toLocaleString() + ' ₸';
        }

        function prePay(method) {
            if (!cart.length) return;
            currentMethod = method;
            let html = cart.map(i => `<div class="m-row"><span>${i.name}</span> <span>${i.qty} x ${i.price}</span></div>`).join('');
            const sum = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            html += `<div class="m-row" style="border:none; margin-top:20px; font-weight:bold; font-size:22px; color:#2ecc71;"><span>ИТОГО:</span><span>${sum.toLocaleString()} ₸</span></div>`;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('confirm-btn').onclick = () => sendPay();
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function sendPay() {
            closeModal();
            document.getElementById('cs').classList.add('sync');
            const tid = (mode==='sale'?'SL-':'RT-') + Math.random().toString(36).substring(7).toUpperCase();
            const p = {
                tx_id: tid, tx_type: mode, payment_method: currentMethod, source: "pos_v4.6",
                cart: cart.map(c => ({item_id:c.id, item_name:c.name, qty:c.qty, price:c.price, cost_price:c.cost}))
            };
            try {
                await Promise.all([
                    fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify(p)}),
                    fetch(MAKE_WEBHOOK_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)})
                ]);
                document.getElementById('ta').innerText = "УСПЕШНО";
                setTimeout(() => { cart=[]; update(); document.getElementById('cs').classList.remove('sync'); load(); }, 600);
            } catch (e) { alert("ОШИБКА"); document.getElementById('cs').classList.remove('sync'); }
        }
        load();
    </script>
</body>
</html>
