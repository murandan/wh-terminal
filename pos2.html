<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Noir v5.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        body { background: #0a0a0a; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header-area { flex-shrink: 0; background: #0a0a0a; border-bottom: 1px solid #222; }
        .modes { display: flex; padding: 4px; gap: 4px; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #333; background: #111; color: #444; font-weight: 900; border-radius: 4px; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .m-btn.active-s { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .m-btn.active-r { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }

        .search-area { padding: 0 4px 4px; }
        .s-input { width: 100%; background: #141414; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 10px; font-size: 14px; outline: none; }

        #catalog { flex-grow: 1; overflow-y: auto; padding: 4px; border-bottom: 1px solid #222; }
        .c-item { background: #141414; border: 1px solid #222; border-radius: 6px; padding: 8px 10px; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .i-name { font-size: 13px; font-weight: bold; max-width: 70%; overflow: hidden; }
        .i-meta { font-size: 11px; color: #f1c40f; white-space: nowrap; }

        .cart-sec { flex-shrink: 0; background: #0a0a0a; border-top: 2px solid #2ecc71; display: flex; flex-direction: column; max-height: 40dvh; }
        .cart-sec.r-theme { border-top-color: #e74c3c; background: #1a0a0a; }
        #cart-list { overflow-y: auto; padding: 4px; padding-bottom: 20px; } /* Отступ для клавиатуры */
        
        .cart-row { background: #111; padding: 6px; border-radius: 4px; margin-bottom: 3px; border: 1px solid #222; }
        .row-top { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-ctrl { display: flex; justify-content: space-between; align-items: center; }
        
        /* КЛАССИЧЕСКИЙ БЛОК КОЛИЧЕСТВА */
        .qty-box { display: flex; align-items: center; background: #000; border: 1px solid #333; border-radius: 4px; }
        .q-btn { background: #1a1a1a; color: #f1c40f; width: 38px; height: 38px; border: none; font-size: 20px; cursor: pointer; }
        .q-val { width: 50px; height: 38px; text-align: center; font-size: 16px; font-weight: bold; background: transparent; border: none; color: #fff; outline: none; }
        
        /* КЛАССИЧЕСКОЕ ПОЛЕ ЦЕНЫ */
        .p-input { width: 85px; height: 38px; background: #000; color: #f1c40f; border: 1px solid #333; text-align: right; padding: 8px; border-radius: 4px; font-size: 15px; font-weight: bold; outline: none; }
        
        .footer { flex-shrink: 0; padding: 6px 8px; background: #0a0a0a; border-top: 1px solid #222; }
        .total-box { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; margin-bottom: 6px; }
        .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .pay { height: 42px; border: none; border-radius: 3px; font-weight: bold; font-size: 8px; color: #fff; text-transform: uppercase; cursor: pointer; }
        
        /* ОКНО ПОДТВЕРЖДЕНИЯ (ЧЕК) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; padding: 20px; }
        #modal-content { background: #111; border: 1px solid #2ecc71; padding: 15px; border-radius: 8px; flex-grow: 0; overflow-y: auto; margin-bottom: 20px; max-height: 60dvh; }
        .m-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #222; }
        .m-btns { display: flex; gap: 10px; }
        .m-ok { flex: 2; padding: 15px; background: #27ae60; color: #fff; border: none; font-weight: bold; border-radius: 4px; font-size: 14px;}
        .m-cancel { flex: 1; padding: 15px; background: #444; color: #fff; border: none; border-radius: 4px; font-size: 12px;}
        
        .sync { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="modal">
        <h3 style="margin-bottom:15px; color:#2ecc71; text-align:center;">ПОДТВЕРЖДЕНИЕ</h3>
        <div id="modal-content"></div>
        <div class="m-btns">
            <button class="m-cancel" onclick="closeModal()">ОТМЕНА</button>
            <button class="m-ok" id="confirm-btn">ОК (ОТПРАВИТЬ)</button>
        </div>
    </div>

    <div class="header-area">
        <div class="modes">
            <button id="ms" class="m-btn active-s" onclick="sm('sale')">Продажа</button>
            <button id="mr" class="m-btn" onclick="sm('return')">Возврат</button>
        </div>
        <div class="search-area">
            <input type="text" id="sb" class="s-input" placeholder="ПОИСК..." onkeyup="filter()">
        </div>
    </div>

    <div id="catalog"></div>

    <div id="cs" class="cart-sec">
        <div id="cart-list"></div>
        <div class="footer">
            <div class="total-box">
                <span id="tl">ИТОГО:</span>
                <span id="ta">0 ₸</span>
            </div>
            <div class="btns">
                <button class="pay" style="background:#27ae60" onclick="prePay('cash')">Нал</button>
                <button class="pay" style="background:#c0392b" onclick="prePay('qr_kaspi')">QR</button>
                <button class="pay" style="background:#2980b9" onclick="prePay('pos_terminal')">Карт</button>
                <button class="pay" style="background:#f39c12;color:#000" onclick="prePay('transfer')">Пер</button>
            </div>
        </div>
    </div>

    <script src="config.js?v=5.0"></script>
    <script>
        let db = [], cart = [], mode = 'sale', currentMethod = '';

        function sm(m) {
            mode = m;
            document.getElementById('ms').classList.toggle('active-s', m==='sale');
            document.getElementById('mr').classList.toggle('active-r', m==='return');
            document.getElementById('cs').classList.toggle('r-theme', m==='return');
            document.getElementById('tl').innerText = m==='return'?'К ВОЗВРАТУ:':'ИТОГО:';
        }

        async function load() {
            try {
                const res = await fetch(APPS_SCRIPT_URL + "?action=getItems&t=" + Date.now());
                db = await res.json();
                render();
            } catch (e) { console.error("error"); }
        }

        function render() {
            document.getElementById('catalog').innerHTML = db.map(i => `
                <div class="c-item" onclick="add('${i.id}')">
                    <div class="i-name">${i.name}</div>
                    <div class="i-meta">${i.price} ₸ [${i.stock||0}]</div>
                </div>
            `).join('');
        }

        function filter() {
            let q = document.getElementById('sb').value.toLowerCase();
            document.querySelectorAll('.c-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q)?'flex':'none';
            });
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({id:p.id, name:p.name, qty:1, price:p.price, cost:p.cost});
            update();
            const list = document.getElementById('cart-list');
            list.scrollTop = list.scrollHeight;
        }

        function update() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-row" id="r-${item.id}">
                    <div class="row-top">${item.name}</div>
                    <div class="row-ctrl">
                        <div class="qty-box">
                            <button class="q-btn" onclick="qty('${item.id}',-1)">-</button>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" class="q-val" value="${item.qty}" 
                                   onfocus="handleFocus(this, 'r-${item.id}')" 
                                   oninput="cart[${idx}].qty=parseInt(this.value)||0; total()"
                                   onblur="if(cart[${idx}].qty<=0) rm('${item.id}')">
                            <button class="q-btn" onclick="qty('${item.id}',1)">+</button>
                        </div>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" class="p-input" value="${item.price}" 
                               onfocus="handleFocus(this, 'r-${item.id}')" 
                               oninput="cart[${idx}].price=parseFloat(this.value)||0; total()">
                        <div onclick="rm('${item.id}')" style="color:#e74c3c;padding:3px;font-size:18px;cursor:pointer;">✕</div>
                    </div>
                </div>
            `).join('');
            total();
        }

        function handleFocus(elem, rowId) {
            elem.select();
            // Плавный скролл, чтобы клавиатура не перекрывала строку
            setTimeout(() => {
                const el = document.getElementById(rowId);
                if(el) el.scrollIntoView({behavior: "smooth", block: "center"});
            }, 350);
        }

        function qty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) rm(id); else update(); }
        }

        function rm(id) { cart = cart.filter(x => x.id !== id); update(); }

        function total() {
            const s = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('ta').innerText = s.toLocaleString() + ' ₸';
        }

        function prePay(method) {
            if (!cart.length) return;
            currentMethod = method;
            let html = cart.map(i => `<div class="m-row"><span>${i.name} x${i.qty}</span> <span>${(i.price*i.qty).toLocaleString()}</span></div>`).join('');
            const sum = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            html += `<div class="m-row" style="border:none; margin-top:10px; font-weight:bold; font-size:16px; color:#2ecc71;"><span>ИТОГО:</span><span>${sum.toLocaleString()} ₸</span></div>`;
            html += `<div class="m-row" style="color:#f1c40f; border:none;"><span>ОПЛАТА:</span><span>${method.toUpperCase()}</span></div>`;
            
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('confirm-btn').onclick = () => sendPay();
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function sendPay() {
            closeModal();
            document.getElementById('cs').classList.add('sync');
            const tid = (mode==='sale'?'SL-':'RT-') + Math.random().toString(36).substring(7).toUpperCase();
            const p = {
                tx_id: tid, tx_type: mode, payment_method: currentMethod, source: "pos_v5.0_classic",
                cart: cart.map(c => ({item_id:c.id, item_name:c.name, qty:c.qty, price:c.price, cost_price:c.cost}))
            };
            try {
                await Promise.all([
                    fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify(p)}),
                    fetch(MAKE_WEBHOOK_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)})
                ]);
                document.getElementById('ta').innerText = "УСПЕШНО";
                setTimeout(() => { cart=[]; update(); document.getElementById('cs').classList.remove('sync'); load(); }, 600);
            } catch (e) { alert("ОШИБКА"); document.getElementById('cs').classList.remove('sync'); }
        }
        
        load();
    </script>
</body>
</html>
