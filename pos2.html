<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Noir V4.2.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        body { background: #0a0a0a; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.3s; }
        
        .header-area { flex-shrink: 0; border-bottom: 1px solid #222; }
        .modes { display: flex; padding: 4px; gap: 4px; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #333; background: #111; color: #444; font-weight: 900; border-radius: 4px; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .m-btn.active-s { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .m-btn.active-r { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }

        .search-area { padding: 0 4px 4px; }
        .s-input { width: 100%; background: #141414; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 10px; font-size: 14px; outline: none; }

        .list-header { display: flex; padding: 4px 10px; font-size: 10px; color: #666; font-weight: bold; border-bottom: 1px solid #222; }
        .lh-name { flex-grow: 1; }
        .lh-price { width: 85px; text-align: right; }
        .lh-stock { width: 45px; text-align: right; }

        #catalog { flex-grow: 1; overflow-y: auto; padding: 4px; border-bottom: 1px solid #222; }
        .c-item { background: #141414; border: 1px solid #222; border-radius: 4px; padding: 8px 10px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
        .i-name { flex-grow: 1; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .i-price { width: 85px; font-size: 13px; font-weight: bold; text-align: right; color: #fff; }
        .i-stock { width: 45px; font-size: 14px; font-weight: bold; text-align: center; color: #00ffff; background: #003333; border: 1px solid #008888; border-radius: 3px; padding: 2px 0; }

        .cart-sec { flex-shrink: 0; background: rgba(0,0,0,0.5); border-top: 2px solid #2ecc71; display: flex; flex-direction: column; max-height: 40dvh; }
        .cart-sec.r-theme { border-top-color: #e74c3c; }
        #cart-list { overflow-y: auto; padding: 4px; }
        
        .cart-row { background: #111; padding: 6px; border-radius: 4px; margin-bottom: 3px; border: 1px solid #222; }
        .row-top { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-ctrl { display: flex; justify-content: space-between; align-items: center; }
        
        /* ИЗМЕНЕННОЕ ПОЛЕ КОЛИЧЕСТВА */
        .qty-box { display: flex; align-items: center; background: #000; border: 1px solid #333; border-radius: 4px; }
        .q-btn { background: #1a1a1a; color: #f1c40f; width: 38px; height: 38px; border: none; font-size: 20px; cursor: pointer; }
        .q-val { width: 50px; height: 38px; text-align: center; font-size: 16px; font-weight: bold; background: transparent; border: none; color: #fff; outline: none; border-left: 1px solid #333; border-right: 1px solid #333; }
        
        .p-input { width: 85px; background: #000; color: #f1c40f; border: 1px solid #333; text-align: right; padding: 8px; border-radius: 4px; font-size: 15px; font-weight: bold; outline: none; }
        
        .footer { flex-shrink: 0; padding: 6px 8px; border-top: 1px solid #222; }
        .total-box { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; margin-bottom: 6px; }
        
        .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .pay { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 46px; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
        .pay-title { font-weight: bold; font-size: 9px; text-transform: uppercase; margin-bottom: 2px; }
        .pay-sum { font-size: 11px; font-weight: 900; opacity: 0.85; }
        
        .p-cash { background: #27ae60; }
        .p-qr { background: #c0392b; }
        .p-card { background: #2980b9; }
        .p-trans { background: #f39c12; color: #000 !important; }
        .p-trans .pay-sum { color: #000; }

        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .receipt-box { width: 100%; max-width: 400px; border: 2px dashed #444; background: #111; padding: 20px; border-radius: 8px; }
        .r-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .r-method { text-align: center; font-size: 12px; color: #f1c40f; margin-bottom: 15px; text-transform: uppercase; }
        .r-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; border-bottom: 1px dotted #333; padding-bottom: 2px; }
        .r-name { width: 65%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }
        .r-price { font-weight: bold; }
        .r-total { text-align: right; font-size: 18px; font-weight: bold; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .cancel-btn { flex: 1; padding: 15px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .confirm-btn { flex: 2; padding: 15px; background: #2ecc71; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .confirm-btn:disabled { background: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="modes">
            <button id="ms" class="m-btn active-s" onclick="sm('sale')">ПРОДАЖА</button>
            <button id="mr" class="m-btn" onclick="sm('return')">ВОЗВРАТ</button>
        </div>
        <div class="search-area">
            <input type="text" id="sb" class="s-input" placeholder="ПОИСК..." onkeyup="filter()">
        </div>
        <div class="list-header">
            <div class="lh-name">НАИМЕНОВАНИЕ</div>
            <div class="lh-price">ЦЕНА</div>
            <div class="lh-stock">ОСТ</div>
        </div>
    </div>

    <div id="catalog"></div>

    <div id="cs" class="cart-sec">
        <div id="cart-list"></div>
        <div class="footer">
            <div class="total-box">
                <span id="tl">ИТОГО:</span>
                <span id="ta">0 ₸</span>
            </div>
            <div class="btns">
                <button class="pay p-cash" onclick="initPay('cash', 'Наличные')"><span class="pay-title">Нал</span><span class="pay-sum">0 ₸</span></button>
                <button class="pay p-qr" onclick="initPay('qr_kaspi', 'Kaspi QR')"><span class="pay-title">QR</span><span class="pay-sum">0 ₸</span></button>
                <button class="pay p-card" onclick="initPay('pos_terminal', 'Карта')"><span class="pay-title">Карт</span><span class="pay-sum">0 ₸</span></button>
                <button class="pay p-trans" onclick="initPay('transfer', 'Перевод')"><span class="pay-title">Пер</span><span class="pay-sum">0 ₸</span></button>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="modal-overlay">
        <div class="receipt-box">
            <div id="r-title" class="r-title">ПОДТВЕРЖДЕНИЕ</div>
            <div id="r-method" class="r-method">Метод оплаты</div>
            <div id="r-items-list"></div>
            <div id="r-total" class="r-total">ИТОГО: 0 ₸</div>
            
            <div class="modal-btns">
                <button class="cancel-btn" onclick="cancelTx()">ОТМЕНА</button>
                <button id="btn-confirm" class="confirm-btn" onclick="confirmTx()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>
    </div>

    <script src="config.js?v=4.2"></script>
    <script>
        let db = [], cart = [], mode = 'sale';
        let pendingMethod = null; 

        function sm(m) {
            mode = m;
            document.getElementById('ms').classList.toggle('active-s', m==='sale');
            document.getElementById('mr').classList.toggle('active-r', m==='return');
            document.getElementById('cs').classList.toggle('r-theme', m==='return');
            document.getElementById('tl').innerText = m==='return'?'К ВОЗВРАТУ:':'ИТОГО:';
            document.body.style.backgroundColor = m === 'return' ? '#2c0b0b' : '#0a0a0a';
        }

        async function load() {
            try {
                const res = await fetch(APPS_SCRIPT_URL + "?action=getItems&t=" + Date.now());
                db = await res.json();
                render();
            } catch (e) { console.error("error"); }
        }

        function render() {
            document.getElementById('catalog').innerHTML = db.map(i => `
                <div class="c-item" onclick="add('${i.id}')">
                    <div class="i-name">${i.name}</div>
                    <div class="i-price">${i.price.toLocaleString()} ₸</div>
                    <div class="i-stock">${i.stock||0}</div>
                </div>
            `).join('');
        }

        function filter() {
            let q = document.getElementById('sb').value.toLowerCase();
            document.querySelectorAll('.c-item').forEach(el => {
                const name = el.querySelector('.i-name').innerText.toLowerCase();
                el.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({id:p.id, name:p.name, qty:1, price:p.price, cost:p.cost});
            update();
            const list = document.getElementById('cart-list');
            list.scrollTop = list.scrollHeight;
        }

        function update() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-row" id="r-${item.id}">
                    <div class="row-top">${item.name}</div>
                    <div class="row-ctrl">
                        <div class="qty-box">
                            <button class="q-btn" onclick="qty('${item.id}',-1)">-</button>
                            
                            <input type="text" inputmode="numeric" pattern="[0-9]*" class="q-val" value="${item.qty}" 
                                   onfocus="handleFocus(this, 'r-${item.id}')" 
                                   oninput="cart[${idx}].qty=parseInt(this.value)||0; total()"
                                   onblur="if(cart[${idx}].qty<=0) rm('${item.id}')">
                                   
                            <button class="q-btn" onclick="qty('${item.id}',1)">+</button>
                        </div>
                        
                        <input type="text" inputmode="numeric" pattern="[0-9]*" class="p-input" value="${item.price}" 
                               onfocus="handleFocus(this, 'r-${item.id}')" 
                               oninput="cart[${idx}].price=parseFloat(this.value)||0;total()">
                               
                        <div onclick="rm('${item.id}')" style="color:#e74c3c;padding:3px;font-size:18px;cursor:pointer;">✕</div>
                    </div>
                </div>
            `).join('');
            total();
        }

        function handleFocus(elem, rowId) {
            elem.select(); // Автоматическое выделение оставлено
            setTimeout(() => { document.getElementById(rowId).scrollIntoView({behavior: "smooth", block: "center"}); }, 350);
        }

        function qty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) rm(id); else update(); }
        }

        function rm(id) { cart = cart.filter(x => x.id !== id); update(); }

        function total() {
            const s = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('ta').innerText = s.toLocaleString() + ' ₸';
        }

        function initPay(methodCode, methodName) {
            if (!cart.length) return;
            
            pendingMethod = methodCode; 
            
            const titleEl = document.getElementById('r-title');
            if (mode === 'sale') {
                titleEl.innerText = "ПОДТВЕРДИТЬ ПРОДАЖУ";
                titleEl.style.color = "#2ecc71";
            } else {
                titleEl.innerText = "ПОДТВЕРДИТЬ ВОЗВРАТ";
                titleEl.style.color = "#e74c3c";
            }
            
            document.getElementById('r-method').innerText = "Оплата: " + methodName;
            
            document.getElementById('r-items-list').innerHTML = cart.map(c => `
                <div class="r-item">
                    <div class="r-name">${c.name}</div>
                    <div class="r-price">${c.qty} x ${c.price.toLocaleString()} ₸</div>
                </div>
            `).join('');
            
            const tSum = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('r-total').innerText = "ИТОГО: " + tSum.toLocaleString() + " ₸";
            
            document.getElementById('receipt-modal').style.display = 'flex';
        }

        function cancelTx() {
            document.getElementById('receipt-modal').style.display = 'none';
            pendingMethod = null;
        }

        async function confirmTx() {
            const btn = document.getElementById('btn-confirm');
            btn.disabled = true;
            btn.innerText = "ЗАПИСЬ...";

            const tid = (mode==='sale'?'SL-':'RT-') + Math.random().toString(36).substring(7).toUpperCase();
            const p = {
                tx_id: tid, tx_type: mode, payment_method: pendingMethod, source: "pos_v4.2.1",
                cart: cart.map(c => ({item_id:c.id, item_name:c.name, qty:c.qty, price:c.price, cost_price:c.cost}))
            };
            
            try {
                await fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify(p)});
                
                document.getElementById('receipt-modal').style.display = 'none';
                btn.disabled = false;
                btn.innerText = "ПОДТВЕРДИТЬ";
                
                document.getElementById('sb').value = '';
                cart = [];
                update();
                filter(); 
                
                if (mode === 'return') {
                    sm('sale'); 
                }
                
                load();
                
            } catch (e) { 
                alert("ОШИБКА ЗАПИСИ. ПРОВЕРЬТЕ ИНТЕРНЕТ."); 
                btn.disabled = false;
                btn.innerText = "ПОДТВЕРДИТЬ";
            }
        }

        load();
    </script>
</body>
</html>
