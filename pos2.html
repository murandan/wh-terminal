<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Noir V3.6</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        body { background: #0a0a0a; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Сжимаем шапку */
        .top-bar { flex-shrink: 0; padding: 4px; border-bottom: 1px solid #222; }
        .modes { display: flex; gap: 4px; margin-bottom: 4px; }
        .m-btn { flex: 1; padding: 8px; border: 1px solid #333; background: #111; color: #444; font-weight: 900; border-radius: 4px; font-size: 11px; }
        .m-btn.active-s { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .m-btn.active-r { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }

        .search-row { display: flex; gap: 4px; }
        .s-input { flex-grow: 1; background: #141414; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 8px; font-size: 13px; outline: none; }

        /* Каталог: максимум плотности */
        #catalog { flex-grow: 1; overflow-y: auto; padding: 4px; }
        .c-item { background: #141414; border: 1px solid #222; border-radius: 4px; padding: 6px 10px; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
        .i-name { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
        .i-meta { font-size: 10px; color: #f1c40f; }

        /* Корзина: не улетает при клавиатуре */
        .cart-sec { flex-shrink: 0; background: #0a0a0a; border-top: 2px solid #2ecc71; display: flex; flex-direction: column; max-height: 40dvh; }
        .cart-sec.r-theme { border-top-color: #e74c3c; }
        #cart-list { overflow-y: auto; padding: 4px; }
        
        .cart-row { background: #111; padding: 4px 8px; border-radius: 4px; margin-bottom: 2px; border: 1px solid #222; }
        .row-top { font-size: 10px; font-weight: bold; color: #777; margin-bottom: 2px; }
        .row-ctrl { display: flex; justify-content: space-between; align-items: center; }
        
        .qty-box { display: flex; align-items: center; background: #000; border: 1px solid #333; border-radius: 3px; }
        .q-btn { background: #181818; color: #f1c40f; width: 30px; height: 30px; border: none; font-size: 16px; }
        .q-val { width: 24px; text-align: center; font-size: 12px; font-weight: bold; }
        
        .p-input { width: 75px; background: #000; color: #f1c40f; border: 1px solid #333; text-align: right; padding: 5px; border-radius: 3px; font-size: 13px; font-weight: bold; outline: none; }
        
        .footer { flex-shrink: 0; padding: 6px 8px; background: #0a0a0a; border-top: 1px solid #222; }
        .total-box { display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; margin-bottom: 5px; }
        .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .pay { height: 38px; border: none; border-radius: 3px; font-weight: bold; font-size: 8px; color: #fff; text-transform: uppercase; }
        .sync { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="modes">
            <button id="ms" class="m-btn active-s" onclick="sm('sale')">ПРОДАЖА</button>
            <button id="mr" class="m-btn" onclick="sm('return')">ВОЗВРАТ</button>
        </div>
        <div class="search-row">
            <input type="text" id="sb" class="s-input" placeholder="ПОИСК..." onkeyup="filter()">
        </div>
    </div>

    <div id="catalog"></div>

    <div id="cs" class="cart-sec">
        <div id="cart-list"></div>
        <div class="footer">
            <div class="total-box">
                <span id="tl">ИТОГО:</span>
                <span id="ta">0</span>
            </div>
            <div class="btns">
                <button class="pay" style="background:#27ae60" onclick="pay('cash')">Нал</button>
                <button class="pay" style="background:#c0392b" onclick="pay('qr_kaspi')">QR</button>
                <button class="pay" style="background:#2980b9" onclick="pay('pos_terminal')">Карт</button>
                <button class="pay" style="background:#f39c12;color:#000" onclick="pay('transfer')">Пер</button>
            </div>
        </div>
    </div>

    <script src="config.js?v=3.6"></script>
    <script>
        let db = [], cart = [], mode = 'sale';

        function sm(m) {
            mode = m;
            document.getElementById('ms').classList.toggle('active-s', m==='sale');
            document.getElementById('mr').classList.toggle('active-r', m==='return');
            document.getElementById('cs').classList.toggle('r-theme', m==='return');
            document.getElementById('tl').innerText = m==='return'?'ВОЗВРАТ:':'ИТОГО:';
        }

        async function load() {
            try {
                const res = await fetch(APPS_SCRIPT_URL + "?action=getItems&t=" + Date.now());
                db = await res.json();
                render();
            } catch (e) { console.log("error"); }
        }

        function render() {
            document.getElementById('catalog').innerHTML = db.map(i => `
                <div class="c-item" onclick="add('${i.id}')">
                    <div class="i-name">${i.name}</div>
                    <div class="i-meta">${i.price} ₸ [${i.stock||0}]</div>
                </div>
            `).join('');
        }

        function filter() {
            let q = document.getElementById('sb').value.toLowerCase();
            document.querySelectorAll('.c-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q)?'flex':'none';
            });
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({id:p.id, name:p.name, qty:1, price:p.price, cost:p.cost});
            update();
            const list = document.getElementById('cart-list');
            list.scrollTop = list.scrollHeight;
        }

        function update() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-row" id="r-${item.id}">
                    <div class="row-top">${item.name}</div>
                    <div class="row-ctrl">
                        <div class="qty-box">
                            <button class="q-btn" onclick="qty('${item.id}',-1)">-</button>
                            <div class="q-val">${item.qty}</div>
                            <button class="q-btn" onclick="qty('${item.id}',1)">+</button>
                        </div>
                        <input type="number" class="p-input" value="${item.price}" 
                               onfocus="this.select();setTimeout(()=>document.getElementById('r-${item.id}').scrollIntoView({behavior:'smooth',block:'center'}),350)" 
                               oninput="cart[${idx}].price=parseFloat(this.value)||0;total()">
                        <div onclick="rm('${item.id}')" style="color:#e74c3c;padding:3px;font-size:14px">✕</div>
                    </div>
                </div>
            `).join('');
            total();
        }

        function qty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) rm(id); else update(); }
        }

        function rm(id) { cart = cart.filter(x => x.id !== id); update(); }

        function total() {
            const s = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('ta').innerText = s.toLocaleString();
        }

        async function pay(m) {
            const validCart = cart.filter(c => c.id && c.qty > 0);
            if (!validCart.length) return;
            
            document.getElementById('cs').classList.add('sync');
            const tid = (mode==='sale'?'SL-':'RT-') + Math.random().toString(36).substring(7).toUpperCase();
            
            const p = {
                tx_id: tid, tx_type: mode, payment_method: m, source: "pos_v3.6_noir",
                cart: validCart.map(c => ({item_id:c.id, item_name:c.name, qty:c.qty, price:c.price, cost_price:c.cost}))
            };

            try {
                await Promise.all([
                    fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify(p)}),
                    fetch(MAKE_WEBHOOK_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)})
                ]);
                document.getElementById('ta').innerText = "DONE";
                setTimeout(() => { cart=[]; update(); document.getElementById('cs').classList.remove('sync'); load(); }, 600);
            } catch (e) { alert("FAIL"); document.getElementById('cs').classList.remove('sync'); }
        }

        load();
    </script>
</body>
</html>
