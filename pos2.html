<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Terminal v2.4 - Sale & Return Modes</title>
    <style>
        * { box-sizing: border-box !important; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        
        body, html { 
            background-color: #0a0a0a; color: #ffffff; 
            width: 100%; height: 100dvh; 
            display: flex; flex-direction: column; 
            overflow: hidden; 
        }
        
        .header { flex-shrink: 0; padding: 15px; font-size: 12px; border-bottom: 1px solid #333; text-align: center; color: #666; }

        /* ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМОВ */
        .mode-selector { display: flex; padding: 10px 15px; gap: 10px; border-bottom: 1px solid #333; }
        .mode-btn { flex: 1; padding: 12px; border: 1px solid #333; background: #111; color: #666; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .mode-btn.active-sale { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .mode-btn.active-return { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }

        .search-section { flex-shrink: 0; padding: 10px 15px; border-bottom: 1px solid #333; }
        .search-wrapper { position: relative; width: 100%; }
        .search-input { width: 100%; background: #141414; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 15px; font-size: 16px; outline: none; transition: 0.2s;}
        .search-input:focus { border-color: #f1c40f; }
        .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #f1c40f; cursor: pointer; display: none; padding: 10px; font-size: 20px;}

        .catalog-container { flex-grow: 1; overflow-y: auto; padding: 10px 15px; }
        
        .catalog-item { 
            background: #141414; border: 1px solid #222; border-radius: 8px; 
            padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .catalog-item:active { background: #1a1a1a; border-color: #f1c40f; }
        .item-info { flex-grow: 1; }
        .item-name { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
        .item-price-label { font-size: 14px; color: #f1c40f; }
        .add-icon { font-size: 28px; color: #f1c40f; padding-left: 15px; }

        /* КОРЗИНА И ТЕМА ВОЗВРАТА */
        .cart-section { 
            flex-shrink: 0; background: #111; 
            border-top: 2px solid #2ecc71; padding: 15px; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        .cart-section.return-theme { border-top-color: #e74c3c; background: #1a0a0a; }

        .cart-items { max-height: 220px; overflow-y: auto; margin-bottom: 10px; padding-right: 5px; scroll-behavior: smooth; }
        
        .cart-row { 
            display: flex; flex-direction: column; margin-bottom: 12px; 
            background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; 
        }
        .cart-row-name { font-weight: bold; font-size: 16px; color: #eee; margin-bottom: 12px; }
        
        .cart-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        .qty-controls { display: flex; align-items: center; background: #000; border-radius: 6px; border: 1px solid #444; }
        .qty-btn { background: #222; border: none; color: #f1c40f; font-size: 24px; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 6px; }
        .qty-btn:active { background: #444; }
        .qty-val { width: 35px; text-align: center; font-weight: bold; font-size: 18px; }

        .price-edit { 
            width: 100px; background: #000; color: #f1c40f; border: 1px solid #444; 
            text-align: right; padding: 12px 10px; border-radius: 6px; font-size: 18px; font-weight: bold; outline: none;
        }
        .price-edit:focus { border-color: #f1c40f; background: #0a0a0a; }

        .del-btn { color: #e74c3c; font-size: 24px; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        .total-row { display: flex; justify-content: space-between; font-size: 22px; font-weight: bold; margin: 10px 0; border-top: 1px solid #333; padding-top: 15px; }
        .return-theme .total-row { color: #e74c3c; } /* Красный итог при возврате */

        .pay-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-pay { height: 55px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .btn-cash { background: #27ae60; color: #fff; }
        .btn-qr { background: #e74c3c; color: #fff; }
        .btn-card { background: #2980b9; color: #fff; }
        .btn-transfer { background: #f39c12; color: #000; }

        .syncing { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">POS_TERMINAL_v2.4_SECURE</div>

    <div class="mode-selector">
        <button id="btn-mode-sale" class="mode-btn active-sale" onclick="setMode('sale')">🟢 ПРОДАЖА</button>
        <button id="btn-mode-return" class="mode-btn" onclick="setMode('return')">🔴 ВОЗВРАТ</button>
    </div>

    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" id="search-box" class="search-input" placeholder="Поиск товара..." onkeyup="filterItems()">
            <div id="clear-search" class="clear-btn" onclick="clearSearch()">✖</div>
        </div>
    </div>

    <div id="catalog" class="catalog-container">
        <div style="text-align: center; color: #666; margin-top: 20px;">Загрузка товаров...</div>
    </div>

    <div id="cart-section" class="cart-section">
        <div id="cart-list" class="cart-items"></div>

        <div class="total-row">
            <span id="total-label">ИТОГО:</span>
            <span id="total-amount">0</span>
        </div>

        <div class="pay-buttons">
            <button class="btn-pay btn-cash" onclick="processSale('cash')">Наличные</button>
            <button class="btn-pay btn-qr" onclick="processSale('qr_kaspi')">Kaspi QR</button>
            <button class="btn-pay btn-card" onclick="processSale('pos_terminal')">Карта</button>
            <button class="btn-pay btn-transfer" onclick="processSale('transfer')">Перевод</button>
        </div>
    </div>

    <script src="config.js?v=1"></script>

    <script>
        let itemsDb = [];
        let cart = [];
        let currentMode = 'sale'; // Глобальная переменная режима

        // Функция переключения режимов
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-mode-sale').classList.toggle('active-sale', mode === 'sale');
            document.getElementById('btn-mode-return').classList.toggle('active-return', mode === 'return');
            
            const cartSec = document.getElementById('cart-section');
            const totalLabel = document.getElementById('total-label');
            
            if (mode === 'return') {
                cartSec.classList.add('return-theme');
                totalLabel.innerText = 'К ВОЗВРАТУ:';
            } else {
                cartSec.classList.remove('return-theme');
                totalLabel.innerText = 'ИТОГО:';
            }
        }

        async function loadCatalog() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
                itemsDb = await response.json();
                renderCatalog();
            } catch (e) { console.error("Ошибка загрузки"); }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog');
            container.innerHTML = itemsDb.map(item => `
                <div class="catalog-item" onclick="addToCart('${item.id}')">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price-label">${item.price} ₸</div>
                    </div>
                    <div class="add-icon">+</div>
                </div>
            `).join('');
        }

        function filterItems() {
            const q = document.getElementById('search-box').value.toLowerCase();
            document.getElementById('clear-search').style.display = q ? 'block' : 'none';
            const items = document.querySelectorAll('.catalog-item');
            items.forEach(el => {
                const name = el.querySelector('.item-name').innerText.toLowerCase();
                el.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        function clearSearch() {
            document.getElementById('search-box').value = '';
            filterItems();
        }

        function addToCart(id) {
            const product = itemsDb.find(p => p.id === id);
            const inCart = cart.find(c => c.id === id);

            if (inCart) {
                inCart.qty += 1;
            } else {
                cart.push({ id: product.id, name: product.name, qty: 1, price: product.price, cost: product.cost });
            }
            renderCart();
            
            const cartList = document.getElementById('cart-list');
            cartList.scrollTop = cartList.scrollHeight;
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    removeFromCart(id); // Удаляем, если счетчик дошел до 0 (минус невозможен)
                } else {
                    renderCart();
                }
            }
        }

        function updatePriceLive(id, newPrice) {
            const item = cart.find(c => c.id === id);
            if (item) {
                // ЖЕСТКАЯ БЛОКИРОВКА ОТРИЦАТЕЛЬНЫХ ЦИФР
                let parsedPrice = parseFloat(newPrice) || 0;
                item.price = Math.abs(parsedPrice); 
            }
            updateTotal();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(item => `
                <div class="cart-row">
                    <div class="cart-row-name">${item.name}</div>
                    <div class="cart-controls">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${item.id}', -1)">-</button>
                            <div class="qty-val">${item.qty}</div>
                            <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
                        </div>
                        
                        <input type="number" class="price-edit" min="0" value="${item.price}" 
                               onfocus="this.select(); setTimeout(() => this.scrollIntoView({behavior: 'smooth', block: 'center'}), 200);" 
                               oninput="updatePriceLive('${item.id}', this.value)">
                        
                        <div class="del-btn" onclick="removeFromCart('${item.id}')">✕</div>
                    </div>
                </div>
            `).join('');
            updateTotal();
        }

        function removeFromCart(id) {
            cart = cart.filter(c => c.id !== id);
            renderCart();
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('total-amount').innerText = total.toLocaleString();
        }

        async function processSale(paymentMethod) {
            if (cart.length === 0) return alert("Корзина пуста");

            const section = document.getElementById('cart-section');
            section.classList.add('syncing');

            // Префикс транзакции меняется в зависимости от режима
            const prefix = currentMode === 'sale' ? "SALE-" : "REF-";
            const tx_id = prefix + Math.random().toString(36).substring(2, 7).toUpperCase();

            for (let item of cart) {
                const payload = {
                    tx_id: tx_id,
                    item_id: item.id,
                    item_name: item.name,
                    qty: item.qty,
                    price: item.price, 
                    cost_price: item.cost,
                    tx_type: currentMode === 'sale' ? "sale" : "refund", // Отправляем корректный тип в Make.com              
                    payment_method: paymentMethod, 
                    source: "pos_v2.4"
                };

                try {
                    await fetch(MAKE_WEBHOOK_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                } catch (e) { alert("Ошибка связи"); }
            }

            document.getElementById('total-amount').innerText = currentMode === 'sale' ? "ОПЛАЧЕНО" : "ВОЗВРАТ ПРОВЕДЕН";
            setTimeout(() => {
                cart = [];
                setMode('sale'); // Автоматически возвращаем в режим продаж после завершения операции
                renderCart();
                clearSearch();
                section.classList.remove('syncing');
            }, 1500);
        }

        loadCatalog();
    </script>
</body>
</html>
