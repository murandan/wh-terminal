<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro V5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; background: #f8fafc; font-family: sans-serif; }
        .scroll-area { flex: 1; overflow-y: auto; }
        .btn-pay { min-height: 55px; border-radius: 14px; font-weight: 800; text-transform: uppercase; font-size: 12px; transition: all 0.1s; }
        .btn-pay:active { transform: scale(0.95); }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

    <header class="bg-white border-b p-4">
        <input type="text" id="search" placeholder="Поиск товара..." oninput="filter()" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
    </header>

    <main class="scroll-area p-4 grid grid-cols-2 gap-3" id="catalog"></main>

    <section class="bg-white border-t p-4 shadow-2xl">
        <div id="cart-list" class="max-h-40 overflow-y-auto mb-4 space-y-2"></div>
        <div class="flex justify-between items-center mb-4">
            <span class="text-gray-500 font-bold">ИТОГО:</span>
            <span id="total" class="text-3xl font-black text-blue-600">0 ₸</span>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="send('cash')" class="btn-pay bg-emerald-500 text-white">Наличные</button>
            <button onclick="send('qr_kaspi')" class="btn-pay bg-red-500 text-white">Kaspi QR</button>
            <button onclick="send('pos_terminal')" class="btn-pay bg-blue-500 text-white">Карта</button>
            <button onclick="send('transfer')" class="btn-pay bg-orange-400 text-white">Перевод</button>
            <button onclick="send('installment')" class="btn-pay bg-purple-500 text-white">Рассрочка</button>
            <button onclick="toggleCart()" class="btn-pay bg-gray-200 text-gray-700">Корзина</button>
        </div>
    </section>

<script>
    let db = [], cart = [];

    async function load() {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=getItems&t=${Date.now()}`);
        db = await res.json();
        render(db);
    }

    function render(data) {
        document.getElementById('catalog').innerHTML = data.map(item => `
            <div onclick="add('${item.id}')" class="bg-white p-4 rounded-2xl shadow-sm border active:bg-blue-50">
                <div class="text-[10px] text-gray-400">ID: ${item.id}</div>
                <div class="font-bold text-sm h-10 overflow-hidden leading-tight">${item.name}</div>
                <div class="mt-2 text-blue-600 font-black">${item.price} ₸</div>
            </div>
        `).join('');
    }

    function add(id) {
        const item = db.find(i => i.id === id);
        const exists = cart.find(c => c.id === id);
        if (exists) exists.quantity++;
        else cart.push({...item, quantity: 1});
        update();
    }

    function update() {
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.map((c, idx) => `
            <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-xl">
                <div class="flex-1 text-xs font-bold">${c.name}</div>
                <input type="number" value="${c.price}" onfocus="this.select()" oninput="cart[${idx}].price=Number(this.value);updateTotal()" class="w-16 p-1 text-center border rounded-lg text-blue-600 font-bold">
                <div class="flex items-center bg-white border rounded-lg">
                    <button onclick="cart[${idx}].quantity--;clean();update()" class="px-2 py-1">-</button>
                    <span class="px-2 font-bold">${c.quantity}</span>
                    <button onclick="cart[${idx}].quantity++;update()" class="px-2 py-1">+</button>
                </div>
            </div>
        `).join('');
        updateTotal();
    }

    function updateTotal() {
        const sum = cart.reduce((a, b) => a + (b.price * b.quantity), 0);
        document.getElementById('total').innerText = sum.toLocaleString() + ' ₸';
    }

    function clean() { cart = cart.filter(c => c.quantity > 0); }

    async function send(method) {
        if (!cart.length) return;
        
        // Убрали двойное подтверждение. Оставили одно простое.
        const sum = cart.reduce((a, b) => a + (b.price * b.quantity), 0);
        if (!confirm(`Продать за ${sum} ₸?`)) return;

        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "Ждите...";

        try {
            const data = { paymentMethod: method, cart: cart };
            await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            fetch(MAKE_WEBHOOK_URL, { method: 'POST', body: JSON.stringify(data) }); // Фоновая отправка в Make
            
            alert("Готово!");
            cart = [];
            update();
            load();
        } catch (e) { alert("Ошибка!"); } 
        finally { btn.disabled = false; btn.innerText = method.toUpperCase(); }
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        render(db.filter(i => i.name.toLowerCase().includes(q)));
    }

    window.onload = load;
</script>
<script src="config.js?v=5.2"></script>
</body>
</html>
