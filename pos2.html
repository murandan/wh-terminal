<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro V5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; background: #f3f4f6; transition: 0.3s; }
        .is-return-mode { background: #fee2e2 !important; }
        .item-grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-cols: 2; gap: 15px; }
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid transparent; }
        .card:active { transform: scale(0.96); background: #f0f7ff; }
        .return-active .card { border-color: #ef4444; }
        .qty-btn { width: 55px; height: 55px; border-radius: 15px; font-size: 28px; font-weight: bold; background: white; border: 1.5px solid #e2e8f0; }
        .pay-btn { height: 65px; border-radius: 20px; font-weight: 900; font-size: 14px; text-transform: uppercase; }
        #toast { position: fixed; top: -70px; left: 0; right: 0; height: 60px; background: #22c55e; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.5s; z-index: 100; }
        .return-active .pay-btn { background-color: #991b1b !important; }
    </style>
</head>
<body id="main-body">

<div id="toast">ОПЕРАЦИЯ ВЫПОЛНЕНА</div>

<header class="bg-white p-5 shadow-sm">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-black text-slate-800 tracking-tighter">КАССА МБ</h1>
        <button onclick="toggleReturn()" id="mode-ind" class="px-5 py-2 bg-slate-100 text-slate-500 rounded-full font-bold text-xs border">ПРОДАЖА</button>
    </div>
    <input type="text" id="search" oninput="filter()" placeholder="Поиск товара..." class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 text-xl font-bold">
</header>

<div class="item-grid grid grid-cols-2" id="catalog"></div>

<footer class="bg-white border-t-2 p-5 rounded-t-[40px] shadow-2xl">
    <div id="cart" class="max-h-[30vh] overflow-y-auto mb-4 space-y-4"></div>
    <div class="flex justify-between items-center mb-6 px-2">
        <span class="text-slate-400 font-bold uppercase text-xs">ИТОГО:</span>
        <span id="total" class="text-4xl font-black text-blue-600">0 ₸</span>
    </div>
    <div class="grid grid-cols-2 gap-3">
        <button onclick="send('cash')" id="btn-cash" class="pay-btn bg-green-500 text-white shadow-lg shadow-green-100">НАЛИЧНЫЕ</button>
        <button onclick="send('qr_kaspi')" id="btn-qr" class="pay-btn bg-red-500 text-white shadow-lg shadow-red-100">KASPI QR</button>
        <button onclick="send('pos_terminal')" id="btn-card" class="pay-btn bg-blue-600 text-white col-span-2">ТЕРМИНАЛ / КАРТА</button>
    </div>
</footer>

<script>
    let db = [], cart = [], isRet = false;

    function toggleReturn() {
        isRet = !isRet;
        const b = document.getElementById('main-body');
        const ind = document.getElementById('mode-ind');
        if(isRet) {
            b.classList.add('is-return-mode', 'return-active');
            ind.innerText = 'ВОЗВРАТ';
            ind.className = 'px-5 py-2 bg-red-600 text-white rounded-full font-bold text-xs border-2 border-red-800';
        } else {
            b.classList.remove('is-return-mode', 'return-active');
            ind.innerText = 'ПРОДАЖА';
            ind.className = 'px-5 py-2 bg-slate-100 text-slate-500 rounded-full font-bold text-xs border';
        }
    }

    async function load() {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=getItems&t=${Date.now()}`);
        db = await res.json();
        render(db);
    }

    function render(data) {
        document.getElementById('catalog').innerHTML = data.map(i => `
            <div onclick="add('${i.id}')" class="card">
                <div class="text-[10px] text-slate-300 font-black mb-1">ID: ${i.id}</div>
                <div class="text-lg font-black text-slate-800 leading-tight h-14 overflow-hidden">${i.name}</div>
                <div class="flex justify-between items-center mt-3">
                    <span class="text-blue-600 font-black text-2xl">${i.price} ₸</span>
                    <span class="text-[11px] bg-slate-100 px-2 py-1 rounded-lg font-bold text-slate-500">ОСТ: ${i.stock}</span>
                </div>
            </div>
        `).join('');
    }

    function add(id) {
        const p = db.find(x => x.id === id);
        const inC = cart.find(x => x.id === id);
        if(inC) inC.quantity++;
        else cart.push({...p, quantity: 1});
        update();
    }

    function update() {
        const list = document.getElementById('cart');
        list.innerHTML = cart.map((c, i) => `
            <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100 flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <span class="text-base font-black text-slate-700 pr-4">${c.name}</span>
                    <input type="number" value="${c.price}" onfocus="this.select()" 
                           oninput="cart[${i}].price=Number(this.value);sum()" 
                           class="w-28 text-right font-black text-blue-600 bg-transparent border-b-4 border-blue-100 outline-none text-2xl">
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-6">
                        <button onclick="qty(${i},-1)" class="qty-btn text-red-500">-</button>
                        <span class="text-3xl font-black text-slate-800 w-8 text-center">${c.quantity}</span>
                        <button onclick="qty(${i},1)" class="qty-btn text-green-500">+</button>
                    </div>
                    <span class="text-slate-400 font-bold">${(c.price * c.quantity).toLocaleString()} ₸</span>
                </div>
            </div>
        `).join('');
        sum();
    }

    function qty(i, d) { cart[i].quantity += d; if(cart[i].quantity <= 0) cart.splice(i, 1); update(); }
    function sum() {
        const s = cart.reduce((a, b) => a + (b.price * b.quantity), 0);
        document.getElementById('total').innerText = s.toLocaleString() + ' ₸';
    }

    async function send(m) {
        if(!cart.length) return;
        const btn = event.target;
        btn.disabled = true;
        try {
            const d = { paymentMethod: m, cart: cart, isReturn: isRet };
            await Promise.all([
                fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify(d)}),
                fetch(MAKE_WEBHOOK_URL, {method:'POST', body:JSON.stringify(d), headers:{'Content-Type':'application/json'}})
            ]);
            document.getElementById('toast').style.top = '0px';
            setTimeout(() => { document.getElementById('toast').style.top = '-70px'; }, 2000);
            cart = []; if(isRet) toggleReturn(); update(); load();
        } catch(e) { alert("СБОЙ"); } finally { btn.disabled = false; }
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        render(db.filter(x => x.name.toLowerCase().includes(q)));
    }
    window.onload = load;
</script>
<script src="config.js?v=5.5"></script>
</body>
</html>
